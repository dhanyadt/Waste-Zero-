<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified recycling symbol made of leaves -->
  
  <!-- Top Arrow Section -->
  <g transform="translate(60,25)">
    <!-- Arrow Shape -->
    <path d="M-20,10 L-5,-5 L10,10 L3,7 Q12,7 17,17 Q18,20 15,25 Q10,15 2,15 L-13,15 Z" fill="url(#greenGradient)" stroke="#2E7D32" stroke-width="1"/>
    
    <!-- Leaf Details -->
    <ellipse cx="-10" cy="8" rx="3" ry="6" fill="#66BB6A" transform="rotate(-20)"/>
    <ellipse cx="-5" cy="12" rx="2" ry="4" fill="#4CAF50" transform="rotate(-10)"/>
    <ellipse cx="0" cy="10" rx="3" ry="5" fill="#2E7D32" transform="rotate(0)"/>
    <ellipse cx="5" cy="15" rx="2" ry="4" fill="#66BB6A" transform="rotate(10)"/>
    <ellipse cx="8" cy="18" rx="2" ry="3" fill="#4CAF50" transform="rotate(15)"/>
  </g>
  
  <!-- Bottom Right Arrow Section -->
  <g transform="translate(85,80) rotate(120)">
    <!-- Arrow Shape -->
    <path d="M-20,10 L-5,-5 L10,10 L3,7 Q12,7 17,17 Q18,20 15,25 Q10,15 2,15 L-13,15 Z" fill="url(#greenGradient)" stroke="#2E7D32" stroke-width="1"/>
    
    <!-- Leaf Details -->
    <ellipse cx="-10" cy="8" rx="3" ry="6" fill="#66BB6A" transform="rotate(-20)"/>
    <ellipse cx="-5" cy="12" rx="2" ry="4" fill="#4CAF50" transform="rotate(-10)"/>
    <ellipse cx="0" cy="10" rx="3" ry="5" fill="#2E7D32" transform="rotate(0)"/>
    <ellipse cx="5" cy="15" rx="2" ry="4" fill="#66BB6A" transform="rotate(10)"/>
    <ellipse cx="8" cy="18" rx="2" ry="3" fill="#4CAF50" transform="rotate(15)"/>
  </g>
  
  <!-- Bottom Left Arrow Section -->
  <g transform="translate(35,80) rotate(240)">
    <!-- Arrow Shape -->
    <path d="M-20,10 L-5,-5 L10,10 L3,7 Q12,7 17,17 Q18,20 15,25 Q10,15 2,15 L-13,15 Z" fill="url(#greenGradient)" stroke="#2E7D32" stroke-width="1"/>
    
    <!-- Leaf Details -->
    <ellipse cx="-10" cy="8" rx="3" ry="6" fill="#66BB6A" transform="rotate(-20)"/>
    <ellipse cx="-5" cy="12" rx="2" ry="4" fill="#4CAF50" transform="rotate(-10)"/>
    <ellipse cx="0" cy="10" rx="3" ry="5" fill="#2E7D32" transform="rotate(0)"/>
    <ellipse cx="5" cy="15" rx="2" ry="4" fill="#66BB6A" transform="rotate(10)"/>
    <ellipse cx="8" cy="18" rx="2" ry="3" fill="#4CAF50" transform="rotate(15)"/>
  </g>
  
  <!-- Define gradient for natural leaf look -->
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>